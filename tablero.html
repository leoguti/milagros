<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🏆 Tablero — Grupo IA Salesiano</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Trebuchet MS', sans-serif;
      margin: 0;
      background: #0f1419;
      color: #e6e6e6;
      min-height: 100vh;
    }
    header {
      background: #1a2332;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a3a52;
    }
    header h1 { margin: 0; font-size: 22px; color: #4fc3f7; }
    header .fecha { color: #8899aa; font-size: 14px; }
    #aviso {
      text-align: center;
      padding: 8px;
      color: #d4c87a;
      font-size: 14px;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
      padding: 18px;
    }
    .card {
      background: #1e2a3a;
      border: 1px solid #2a3a52;
      border-radius: 12px;
      padding: 14px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card.flash {
      transform: scale(1.03);
      box-shadow: 0 0 14px rgba(79,195,247,0.5);
    }
    .card h2 {
      margin: 0 0 2px;
      font-size: 19px;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card .curso { color: #8899aa; font-size: 12px; margin-bottom: 8px; }
    .card .puntos {
      font-size: 18px;
      color: #ffd54f;
      white-space: nowrap;
    }
    .card .estado {
      font-size: 15px;
      line-height: 1.4;
      color: #cfd8dc;
      white-space: pre-wrap;
    }
    .card .logros {
      margin-top: 8px;
      font-size: 14px;
      color: #81c784;
      white-space: pre-wrap;
    }
    .card .stats {
      margin-top: 8px;
      font-size: 13px;
      color: #ffd54f;
    }
    .card .osm-link {
      display: inline-block;
      margin-top: 10px;
      padding: 7px 12px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
    }
    .card .osm-link:hover { background: #1d4ed8; }
    .card .hdyc-link {
      display: inline-block;
      margin-top: 8px;
      margin-left: 6px;
      padding: 7px 12px;
      background: #16a34a;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
    }
    .card .hdyc-link:hover { background: #15803d; }
    .card .progress {
      margin-top: 10px;
      background: #0f1820;
      border-radius: 6px;
      height: 14px;
      overflow: hidden;
      position: relative;
      border: 1px solid #2a3a52;
    }
    .card .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4ade80, #16a34a);
      transition: width 0.5s ease;
    }
    .card .progress-text {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
    }
    .card .progress-text b { color: #4ade80; }
    .card .nooosm {
      display: inline-block;
      margin-top: 10px;
      padding: 7px 12px;
      background: #475569;
      color: #cbd5e1;
      border-radius: 6px;
      font-size: 12px;
    }
    .card.exploradora {
      background: linear-gradient(135deg, #4a1e5c 0%, #7c3aed 100%);
      border-color: #c084fc;
    }
    .card.exploradora h2 { color: #fce7f3; }
    .card.exploradora .estado { color: #fae8ff; }
    .seccion-titulo {
      grid-column: 1 / -1;
      color: #ffd54f;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid #2a3a52;
      padding: 16px 0 6px;
      margin-top: 8px;
    }
    footer {
      text-align: center;
      color: #556;
      font-size: 12px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🏆 Tablero del Grupo IA — Salesiano Duitama</h1>
    <span class="fecha" id="fecha">—</span>
  </header>
  <div id="aviso">⏳ Conectando al tablero en vivo...</div>
  <div id="grid"></div>
  <footer>Tablero vivo · actualizado por Claude durante la clase · Escuela OSM + Vibe Coding</footer>

  <script>
    const TOPICO = 'tablero-salesiano-2026';
    const grid = document.getElementById('grid');
    const aviso = document.getElementById('aviso');
    const fecha = document.getElementById('fecha');

    function render(estado) {
      fecha.textContent = estado.titulo || '';
      grid.innerHTML = '';
      const todos = estado.alumnos || [];
      const activos = todos.filter(a => a.seccion !== 'exploradoras');
      const exploradoras = todos.filter(a => a.seccion === 'exploradoras');
      const orden = [];
      if (activos.length) {
        orden.push({_titulo: '🗺️ Mapeadores activos'});
        orden.push(...activos);
      }
      if (exploradoras.length) {
        orden.push({_titulo: '✨ Exploradoras / Aprendices'});
        orden.push(...exploradoras);
      }
      orden.forEach(a => {
        if (a._titulo) {
          const h = document.createElement('div');
          h.className = 'seccion-titulo';
          h.textContent = a._titulo;
          grid.appendChild(h);
          return;
        }
        const card = document.createElement('div');
        card.className = 'card flash' + (a.seccion === 'exploradoras' ? ' exploradora' : '');
        const stats = (a.ediciones != null || a.changesets != null)
          ? '<div class="stats">' +
            (a.changesets != null ? '🧩 ' + a.changesets + ' changesets · ' : '') +
            (a.ediciones != null ? '✏️ ' + a.ediciones.toLocaleString() + ' ediciones' : '') +
            '</div>'
          : '';
        const META_DIAS = 80;
        const progressBar = (a.mapping_days != null)
          ? '<div class="progress-text"><span>📅 Días de mapeo</span><span><b>' + a.mapping_days + '</b> / ' + META_DIAS + '</span></div>' +
            '<div class="progress"><div class="progress-fill" style="width:' + Math.min(100, Math.round(a.mapping_days/META_DIAS*100)) + '%"></div></div>'
          : '';
        const osmLink = a.osm
          ? '<a class="osm-link" href="https://www.openstreetmap.org/user/' + encodeURIComponent(a.osm) + '" target="_blank">📍 Perfil OSM</a>' +
            '<a class="hdyc-link" href="https://hdyc.neis-one.org/user/' + encodeURIComponent(a.osm) + '" target="_blank">🔍 HDYC</a>'
          : (a.curso === '302' || a.curso === '201' ? '<span class="nooosm">— sin cuenta OSM (aún) —</span>' : '<span class="nooosm">⏳ username pendiente</span>');
        card.innerHTML =
          '<h2>' + a.emoji + ' ' + a.nombre +
          (a.puntos != null ? ' <span class="puntos">' + '⭐'.repeat(a.puntos) + (a.puntos === 0 ? '·' : '') + '</span>' : '') +
          '</h2>' +
          '<div class="curso">' + (a.curso || '') + '</div>' +
          '<div class="estado">' + (a.estado || '') + '</div>' +
          (a.logros ? '<div class="logros">' + a.logros + '</div>' : '') +
          stats +
          progressBar +
          osmLink;
        grid.appendChild(card);
        setTimeout(() => card.classList.remove('flash'), 800);
      });
      aviso.textContent = '🟢 En vivo · última actualización: ' + new Date().toLocaleTimeString();
    }

    // since=12h recupera el último estado publicado aunque abras la página tarde
    const fuente = new EventSource('https://ntfy.envs.net/' + TOPICO + '/sse?since=12h');
    fuente.onopen = () => { aviso.textContent = '🟢 Conectado · esperando primer estado…'; };
    fuente.onmessage = (ev) => {
      try {
        const data = JSON.parse(ev.data);
        if (data.event !== 'message' || data.title !== 'estado') return;
        render(JSON.parse(data.message));
      } catch (e) { console.error(e); }
    };
    fuente.onerror = () => { aviso.textContent = '⚠️ Reconectando…'; };
  </script>
</body>
</html>
