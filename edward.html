<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🛡️ Chat de Edward</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Trebuchet MS', sans-serif;
      margin: 0;
      background: #0f1419;
      color: #e6e6e6;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1a2332;
      color: #4fc3f7;
      padding: 14px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      border-bottom: 1px solid #2a3a52;
    }
    header small { display: block; color: #8899aa; font-weight: 400; font-size: 12px; margin-top: 2px; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .burbuja {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 16px;
      line-height: 1.45;
      animation: aparecer 0.25s ease;
      white-space: pre-wrap;
    }
    @keyframes aparecer {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .claude {
      background: #1e2a3a;
      align-self: flex-start;
      border: 1px solid #2a3a52;
      border-bottom-left-radius: 4px;
    }
    .otro {
      background: #24303f;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .yo {
      background: #144a6e;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .remitente {
      display: block;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 3px;
      color: #4fc3f7;
    }
    .otro .remitente { color: #ffb74d; }
    .yo .remitente { color: #80deea; }
    .sistema {
      align-self: center;
      background: #2a2a1a;
      color: #d4c87a;
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 10px;
    }
    footer {
      background: #1a2332;
      padding: 10px;
      display: flex;
      gap: 8px;
      border-top: 1px solid #2a3a52;
    }
    #entrada {
      flex: 1;
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid #2a3a52;
      border-radius: 20px;
      outline: none;
      font-family: inherit;
      background: #0f1419;
      color: #e6e6e6;
    }
    #entrada:focus { border-color: #4fc3f7; }
    #enviar {
      padding: 12px 22px;
      font-size: 16px;
      background: #1976d2;
      color: white;
      border: 0;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
    }
    #enviar:hover { background: #1565c0; }
  </style>
</head>
<body>
  <header>⚡ Cristian × Claude — tp-routes
    <small id="quien">conectando…</small>
  </header>

  <div id="chat">
    <div class="burbuja sistema">⏳ Conectando...</div>
  </div>

  <footer>
    <input id="entrada" placeholder="Escribe y dale Enter..." autofocus>
    <button id="enviar" onclick="enviar()">Enviar</button>
  </footer>

  <script>
    const TOPICO = 'edward-claude-chat-2026julio17';
    const URL_BASE = 'https://ntfy.envs.net/' + TOPICO;
    const chat = document.getElementById('chat');
    const entrada = document.getElementById('entrada');

    const NOMBRE = 'edward';
    document.getElementById('quien').textContent = 'conectado como: ' + NOMBRE;

    function agregar(clase, remitente, texto) {
      const div = document.createElement('div');
      div.className = 'burbuja ' + clase;
      if (remitente) {
        const span = document.createElement('span');
        span.className = 'remitente';
        span.textContent = remitente;
        div.appendChild(span);
      }
      div.appendChild(document.createTextNode(texto));
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function enviar() {
      const texto = entrada.value.trim();
      if (!texto) return;
      entrada.value = '';
      try {
        await fetch(URL_BASE, {
          method: 'POST',
          headers: { 'Title': NOMBRE },
          body: texto
        });
      } catch (e) {
        agregar('sistema', '', '❌ No se pudo enviar: ' + e.message);
      }
    }

    entrada.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') enviar();
    });

    const vistos = new Set();
    function pintar(data) {
      if (!data || data.event !== 'message') return;
      if (data.id && vistos.has(data.id)) return;
      if (data.id) vistos.add(data.id);
      const remitente = data.title || '';
      if (remitente === 'claude') agregar('claude', '🤖 Claude', data.message);
      else if (remitente === NOMBRE) agregar('yo', '🟦 ' + remitente + ' (tú)', data.message);
      else if (remitente) agregar('otro', '🟧 ' + remitente, data.message);
    }
    async function cargarHistorial() {
      try {
        const res = await fetch(URL_BASE + '/json?poll=1&since=12h');
        const text = await res.text();
        text.trim().split('
').forEach(line => { if (line) { try { pintar(JSON.parse(line)); } catch (e) {} } });
      } catch (e) {}
    }
    cargarHistorial();
    const fuente = new EventSource(URL_BASE + '/sse');
    fuente.onopen = () => { cargarHistorial(); };
    fuente.onmessage = (ev) => { try { pintar(JSON.parse(ev.data)); } catch (e) {} };
    fuente.onerror = () => {};
  </script>
</body>
</html>
